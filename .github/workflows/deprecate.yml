name: Deprecate

# Manual ad-hoc deprecation of one or more published versions via CI, using
# the same NPM_TOKEN secret that release.yml uses for publish. Avoids the
# local `npm login` / WebAuthn friction — the auth path is identical to
# every other npm write op in this org.
#
# Invoke with: gh workflow run deprecate.yml \
#   -f versionRange='<0.10.1' \
#   -f message='superseded by 0.10.1 — install @yawlabs/ctxlint@latest'
#
# To clear a deprecation, pass message='' and the same versionRange.

on:
  workflow_dispatch:
    inputs:
      versionRange:
        description: 'Semver range to deprecate (e.g. <0.10.1 or 0.9.x). Empty deprecates ALL.'
        required: false
        default: ''
      message:
        description: 'Deprecation message (empty string clears deprecation).'
        required: true

jobs:
  deprecate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Deprecate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RANGE: ${{ inputs.versionRange }}
          MESSAGE: ${{ inputs.message }}
        run: |
          if [ -n "$RANGE" ]; then
            TARGET="@yawlabs/ctxlint@${RANGE}"
          else
            TARGET="@yawlabs/ctxlint"
          fi
          echo "Deprecating ${TARGET} with: ${MESSAGE}"
          npm deprecate "$TARGET" "$MESSAGE"

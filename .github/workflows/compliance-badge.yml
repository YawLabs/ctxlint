name: Compliance Badge

# Regenerates compliance-badge.svg by running the published ctxlint MCP
# server against @yawlabs/mcp-compliance, then opens a PR if the badge
# changed.
#
# Implementation notes:
# - Uses `gh` CLI + GitHub's Contents API directly instead of a third-party
#   action. The repo's Actions policy is "allowlist only," so adding a
#   non-allowlisted action (like peter-evans/create-pull-request) causes a
#   startup failure. `gh` is pre-installed on runners, always allowed.
# - Commits via the Contents API are signed by GitHub automatically, which
#   satisfies branch protection's "verified signatures" requirement on main.
# - We open a PR (not push direct to main) because main requires PR review.
#
# Triggers:
#   - workflow_dispatch: manual refresh
#   - After the Release workflow completes: badge matches what's on npm

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]

jobs:
  refresh:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Install mcp-compliance
        run: npm install -g @yawlabs/mcp-compliance

      # Don't fail the job on a non-zero score — the badge should reflect
      # reality. A compliance regression becomes a PR with a visibly worse
      # badge, which is itself the signal.
      # Pass node + its args as separate tokens rather than one quoted
      # string. mcp-compliance's stdio transport spawns with shell: false
      # on Linux, so a single-string "node dist/index.js serve" would be
      # looked up as a literal executable name (ENOENT). Works on Windows
      # via cmd.exe word-splitting, not Linux.
      - name: Generate badge
        run: mcp-compliance test node dist/index.js serve --output compliance-badge.svg || true

      - name: Open PR if badge changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if git diff --quiet compliance-badge.svg; then
            echo "Badge unchanged — nothing to do."
            exit 0
          fi

          BRANCH="bot/compliance-badge-refresh"

          # Delete any stale bot branch so we start from a clean main.
          if gh api "repos/${REPO}/git/ref/heads/${BRANCH}" --silent 2>/dev/null; then
            gh api --method DELETE "repos/${REPO}/git/refs/heads/${BRANCH}"
          fi

          # Branch from current main.
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')
          gh api --method POST "repos/${REPO}/git/refs" \
            -f "ref=refs/heads/${BRANCH}" \
            -f "sha=${MAIN_SHA}"

          # Update file via Contents API (auto-signed commit).
          EXISTING_SHA=$(gh api "repos/${REPO}/contents/compliance-badge.svg?ref=${BRANCH}" --jq '.sha')
          CONTENT_B64=$(base64 -w0 compliance-badge.svg)
          gh api --method PUT "repos/${REPO}/contents/compliance-badge.svg" \
            -f "message=chore: refresh MCP compliance badge" \
            -f "content=${CONTENT_B64}" \
            -f "sha=${EXISTING_SHA}" \
            -f "branch=${BRANCH}"

          # Close any existing open PR from this branch (replace with a fresh one).
          gh pr list --head "${BRANCH}" --state open --json number --jq '.[].number' | \
            xargs -r -I {} gh pr close {} --delete-branch=false

          gh pr create --base main --head "${BRANCH}" \
            --title "chore: refresh MCP compliance badge" \
            --body "Auto-generated by the Compliance Badge workflow. Regenerated \`compliance-badge.svg\` by running the published ctxlint MCP server against \`@yawlabs/mcp-compliance\`. Merge to update the README badge. If the badge now shows a lower grade, investigate before merging — something regressed."

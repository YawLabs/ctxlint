name: Compliance Badge

# Regenerates compliance-badge.svg by running the published ctxlint MCP
# server against @yawlabs/mcp-compliance, then opens a PR if the badge
# changed. We open a PR (instead of pushing direct) because main requires
# PR + signed commits; github-actions[bot] can't bypass those rules.
#
# Triggers:
#   - After Release workflow completes (badge reflects what's on npm)
#   - Manual via workflow_dispatch (refresh anytime)

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]

jobs:
  refresh:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Install mcp-compliance
        run: npm install -g @yawlabs/mcp-compliance

      # Don't fail the job on a non-zero score — we want the badge to reflect
      # reality, even if the grade drops. A compliance regression becomes a PR
      # with a visibly worse badge, which is itself the signal.
      - name: Generate badge
        run: mcp-compliance test "node dist/index.js serve" --output compliance-badge.svg || true

      - name: Open PR if badge changed
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: refresh MCP compliance badge'
          title: 'chore: refresh MCP compliance badge'
          body: |
            Auto-generated by the Compliance Badge workflow.

            Regenerated `compliance-badge.svg` by running the published ctxlint MCP server against `@yawlabs/mcp-compliance`. Merge to update the badge shown in the README.

            If the badge now shows a lower grade, investigate before merging — something regressed.
          branch: bot/compliance-badge-refresh
          delete-branch: true
          add-paths: compliance-badge.svg
          sign-commits: true

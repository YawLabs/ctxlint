name: Compliance Badge

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: npm install -g @yawlabs/mcp-compliance
      - run: mcp-compliance test "node dist/index.js serve" --output compliance-badge.svg || true

      - uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: refresh MCP compliance badge'
          title: 'chore: refresh MCP compliance badge'
          branch: bot/compliance-badge-refresh
          delete-branch: true
          add-paths: compliance-badge.svg

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: npx tsc --noEmit

      # CLI-level tests execFileSync dist/index.js, so the bundle must exist
      # (and be fresh) before vitest runs. The pretest:run hook builds it
      # (pnpm auto-runs pre-scripts), so a separate Build step would run
      # build.mjs twice per leg.
      - name: Test
        run: pnpm run test:run
